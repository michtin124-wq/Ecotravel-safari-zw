  <!-- Navigation -->

  <!-- Hero Banner -->
  <section class="hero-banner contact-banner">
    <div class="overlay">
      <h1>Get in Touch</h1>
      <p>We’d love to hear from you — let’s plan your next eco‑adventure!</p>

  <!-- Contact Section -->
  <section class="contact">
    <h2>Contact Us</h2>
    <form id="contactForm">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" id="email" placeholder="Your Email" required>
      <textarea id="message" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>

    <div class="contact-info">
      <p>📧 Email: <a href="mailto:info@ecotravelagency.com">info@ecotravelagency.com</a></p>
      <p>📞 Phone: <a href="tel:+263771234567">+263 77 123 4567</a></p>
      <p>📍 Location: Harare, Zimbabwe</p>
    </div>
  </section>
